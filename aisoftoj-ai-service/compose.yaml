services:
  api:
    build: .
    restart: unless-stopped
    env_file: .env
    command: uvicorn aisoftoj_ai.main:app --host 0.0.0.0 --port 8090
    environment:
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
    ports:
      - "${AI_SERVICE_PORT:-8090}:8090"
    volumes:
      - ai-data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8090/health')"]
      interval: 15s
      timeout: 5s
      retries: 10
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  worker:
    build: .
    restart: unless-stopped
    env_file: .env
    command: arq aisoftoj_ai.worker.WorkerSettings
    environment:
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
    volumes:
      - ai-data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import redis; redis.Redis.from_url('redis://redis:6379/0').ping()"]
      interval: 15s
      timeout: 5s
      retries: 10
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.13.6
    restart: unless-stopped
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/6333'"]
      interval: 10s
      timeout: 3s
      retries: 15

volumes:
  ai-data:
  redis-data:
  qdrant-data:
