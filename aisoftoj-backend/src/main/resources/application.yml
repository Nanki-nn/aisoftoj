server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/aisoftoj?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: root
    password: abc123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.nan.aisoftoj.entity
  configuration:
    map-underscore-to-camel-case: true

# 文件上传配置
file:
  upload:
    path: ${FILE_UPLOAD_PATH:./uploads/}
    url-prefix: ${FILE_UPLOAD_URL_PREFIX:/uploads/}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173}

auth:
  jwt:
    secret: ${AUTH_JWT_SECRET:dev-change-me-before-prod}
    expire-hours: ${AUTH_JWT_EXPIRE_HOURS:168}

logging:
  level:
    com.nan.aisoftoj: ${APP_LOG_LEVEL:info}

claude:
  api-key: ${CLAUDE_API_KEY:}
  model: claude-sonnet-4-6
